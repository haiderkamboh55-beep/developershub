services:
  # Python Flask Backend
  - type: web
    name: developershub-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: developershub-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        # Update this to your deployed Vercel domain once you have it.
        # This wildcard relies on Vercel handling the proxy securely.
        value: "*"

databases:
  # Managed PostgreSQL Database
  - name: developershub-db
    databaseName: developershub
    user: admin
