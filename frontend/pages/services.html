<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services - DevelopersHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div style="
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 60px,
      rgba(255,255,255,0.04) 60px, rgba(255,255,255,0.04) 61px),
    repeating-linear-gradient(
      90deg, transparent, transparent 60px,
      rgba(255,255,255,0.04) 60px, rgba(255,255,255,0.04) 61px);
  "></div>

  <nav class="navbar">
    <div class="container nav-inner">
      <a href="../index.html" class="logo">Developers<span>Hub</span></a>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html" class="active">Services</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="booking.html" class="nav-cta">Book a Meeting</a></li>
      </ul>
      <button class="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="page-header" data-aos="fade-up">
    <div class="container">
      <div class="section-badge">What We Do</div>
      <h1>Our Services</h1>
      <p>Comprehensive development solutions tailored to your business.</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="grid-3" id="services-grid">
        <div class="skeleton loading-card"></div>
        <div class="skeleton loading-card"></div>
        <div class="skeleton loading-card"></div>
      </div>
    </div>
  </section>

  <script src="../js/main.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    window.addEventListener('scroll', () => {
      document.querySelector('.navbar').classList.toggle('scrolled', window.scrollY > 20);
    });

    async function loadServices() {
      try {
        const services = await apiGet('/services/');
        const sg = document.getElementById('services-grid');
        sg.innerHTML = services.map((s, index) => `
          <div class="card service-card" data-aos="fade-up" data-aos-delay="${index*100}" data-tilt data-tilt-glare data-tilt-max-glare="0.4" data-tilt-scale="1.05" data-tilt-speed="400">
            <div class="service-icon">${getIcon(s.icon)}</div>
            <h3>${s.title}</h3>
            <p>${s.description}</p>
          </div>
        `).join('') || '<p style="color:var(--text-muted);grid-column:1/-1;text-align:center">No services found.</p>';
        VanillaTilt.init(document.querySelectorAll(".service-card"));
      } catch(e) { console.error(e); }
    }
    loadServices();
    AOS.init({ duration: 650, once: true, offset: 80, easing: 'ease-out-cubic' });
  </script>
</body>
</html>
