<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Inquiries - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="../../css/admin.css?v=1.2">
</head>
<body>
  <div style="
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 60px,
      rgba(255,255,255,0.04) 60px, rgba(255,255,255,0.04) 61px),
    repeating-linear-gradient(
      90deg, transparent, transparent 60px,
      rgba(255,255,255,0.04) 60px, rgba(255,255,255,0.04) 61px);
  "></div>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text" style="font-family:'Playfair Display'; font-style:italic;">Developers<span>Hub</span></div><small style="opacity:0.6; font-size:10px; text-transform:uppercase; letter-spacing:1px; margin-top:4px; display:block;">Admin Panel</small>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Overview</div>
      <a class="sidebar-link" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
      <div class="nav-section">Content</div>
      <a class="sidebar-link" href="services.html"><span class="icon">⚙️</span> Services</a>
      <a class="sidebar-link" href="portfolio.html"><span class="icon">🖥️</span> Portfolio</a>
      <a class="sidebar-link" href="blog.html"><span class="icon">📝</span> Blog Posts</a>
      <div class="nav-section">Clients</div>
      <a class="sidebar-link active" href="inquiries.html"><span class="icon">💬</span> Inquiries</a>
      <a class="sidebar-link" href="bookings.html"><span class="icon">📅</span> Bookings</a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn" onclick="logout()">🚪 Sign Out</button></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1 data-aos="fade-right">Client Inquiries</h1>
    </div>
    <div class="content">
      <div class="panel" data-aos="fade-up">
        <table>
          <thead><tr><th>ID</th><th>Client Details</th><th>Inquiry Message</th><th>Current Stage</th><th>Quick Action</th></tr></thead>
          <tbody id="tbody"><tr><td colspan="6" class="empty-state">Retrieving conversations...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="../../js/main.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 650, once: true });
    if (!localStorage.getItem('token')) window.location.href = 'login.html';
    function logout() { localStorage.clear(); window.location.href = 'login.html'; }

    function statusBadge(status) {
      const map = { unread: 'badge-danger', read: 'badge-info', resolved: 'badge-success' };
      return `<span class="badge ${map[status] || 'badge-info'}">${status}</span>`;
    }

    async function loadData() {
      try {
        const data = await apiAdmin('GET', '/contact/');
        document.getElementById('tbody').innerHTML = data.map(i => `
          <tr>
            <td style="opacity:0.6;">#${i.id}</td>
            <td>
              <strong style="color:#0f1f0f;">${i.name}</strong><br>
              <a href="mailto:${i.email}" style="font-size:12px; color:#14532d;">${i.email}</a><br>
              <small style="color:#2d4a2d; font-size:11px;">${i.phone||'No phone provided'}</small>
            </td>
            <td style="max-width:300px; font-size:0.9rem; color:#2d4a2d; overflow:hidden; text-overflow:ellipsis; white-space:nowrap" title="${i.message}">${i.message}</td>
            <td>${statusBadge(i.status)}</td>
            <td>
              <select onchange="updateStatus(${i.id}, this.value)" style="padding:0.5rem; border-radius:50px; border:1.5px solid #e8f2e8; background:rgba(255,255,255,0.7); font-size:12px; font-weight:700; cursor:pointer;">
                <option value="unread" ${i.status==='unread'?'selected':''}>Unread</option>
                <option value="read" ${i.status==='read'?'selected':''}>Read</option>
                <option value="resolved" ${i.status==='resolved'?'selected':''}>Resolved</option>
              </select>
            </td>
          </tr>
        `).join('') || '<tr><td colspan="6" class="empty-state">No inquiries found. Check back later!</td></tr>';
      } catch(e) { if(e.message.includes('401')) logout(); }
    }

    async function updateStatus(id, newStatus) {
      await apiAdmin('PUT', `/contact/${id}/status`, { status: newStatus });
      loadData();
    }

    loadData();
  </script>
</body>
</html>
